<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSSL Validation Task</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="setupScreen" class="setup-panel" aria-labelledby="setupTitle">
        <div class="study-mark">CSSL Validation</div>
        <h1 id="setupTitle">参加者セッション</h1>
        <form id="setupForm" class="setup-form">
          <label class="field-label" for="participantId">参加者ID</label>
          <input id="participantId" name="participantId" type="text" autocomplete="off" required>

          <label class="field-label" for="listOverride">リスト</label>
          <select id="listOverride" name="listOverride">
            <option value="">自動割付</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>

          <button id="startButton" class="primary-button" type="submit">開始</button>
        </form>
        <p id="setupStatus" class="status-line" role="status"></p>
      </section>

      <section id="taskScreen" class="task-screen hidden" aria-live="polite">
        <header class="task-header">
          <div>
            <div id="phaseLabel" class="phase-label">待機</div>
            <h2 id="taskTitle">準備</h2>
          </div>
          <div class="progress-wrap" aria-hidden="true">
            <div id="progressText" class="progress-text">0 / 0</div>
            <div class="progress-track">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>
        </header>

        <div id="messagePanel" class="message-panel hidden">
          <h3 id="messageTitle">準備</h3>
          <p id="messageBody"></p>
          <button id="continueButton" class="primary-button" type="button">続ける</button>
        </div>

        <div id="trialPanel" class="trial-panel hidden">
          <div class="trial-cue">
            <span id="trialCueText">音声</span>
            <button id="replayButton" class="icon-button hidden" type="button" aria-label="もう一度聞く" title="もう一度聞く">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
          <div id="objectGrid" class="object-grid"></div>
        </div>
      </section>

      <section id="finishScreen" class="finish-panel hidden" aria-labelledby="finishTitle">
        <div class="study-mark">CSSL Validation</div>
        <h1 id="finishTitle">終了</h1>
        <div id="summaryBox" class="summary-box"></div>
        <div class="download-row">
          <button id="downloadXlsxButton" class="primary-button" type="button">Excelを保存</button>
        </div>
      </section>
    </main>

    <script src="task.js"></script>
  </body>
</html>
